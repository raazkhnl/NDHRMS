version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: psc_system
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/psc_system
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_use_openssl_rand_hex_32}
      JWT_EXPIRES_IN: 24h
      CLIENT_ORIGIN: http://localhost
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # At build time the React bundle needs an API URL. For docker-compose on
        # the same host, point to the server via host-mapped port.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

  # One-shot seeder. Run: `docker compose run --rm seed`
  seed:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/psc_system
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_use_openssl_rand_hex_32}
    command: node seed/seedData.js
    profiles: ["seed"]

volumes:
  mongo_data:
